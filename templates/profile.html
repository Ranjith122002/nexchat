{% extends "base.html" %}
{% block title %}Profile — NexChat{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark">{{ current_user.username[0].upper() }}</div>
      <h1>{{ current_user.username }}</h1>
    </div>
    <p class="auth-tagline">Manage your profile settings.</p>

    <form method="POST" class="auth-form">
      <div class="field">
        <label>Username</label>
        <input type="text" value="{{ current_user.username }}" disabled/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="text" value="{{ current_user.email }}" disabled/>
      </div>
      <div class="field">
        <label>Bio</label>
        <textarea name="bio" placeholder="Tell people about yourself...">{{ current_user.bio }}</textarea>
      </div>
      <button type="submit" class="btn-auth">Save Changes</button>
    </form>

    <p class="auth-switch"><a href="{{ url_for('chat') }}">← Back to Chat</a></p>
  </div>
</div>
{% endblock %}
